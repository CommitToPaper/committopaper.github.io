<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommitToPaper</title>
  <link rel="icon" href="CommitToPaper_2026_logo-bw.png" type="image/png">
  <style>
    :root {
      --teal: #00939D;
      --amber: #FFC27B;
      --light-teal: #5ac9d4;
      --pale-teal: #befbff;
      --orange: #ff8b42;
      --text: #1f2a2e;
      --background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--background);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(100%, 56em);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--light-teal);
      border-right: 1px solid var(--light-teal);
    }

    header {
      display: flex;
      align-items: center;
      gap: 2em;
      padding: 1.5em 2em;
      border-bottom: 0.35em solid var(--amber);
    }

    .logo {
      width: 12em;
      max-width: 40%;
      height: auto;
      display: block;
      flex: 0 0 auto;
    }

    .header-title {
      margin: 0;
      color: var(--teal);
      font-size: clamp(1.6em, 4vw, 2.6em);
      line-height: 1.15;
    }

    main {
      flex: 1;
      padding: 4em 2em;
      display: flex;
      align-items: center;
    }

    .content {
      max-width: 42em;
    }

    p {
      margin: 0 0 1em;
      line-height: 1.6;
    }

    footer {
      padding: 2em;
      background: var(--pale-teal);
      color: var(--text);
      border-top: 0.35em solid var(--amber);
    }

    footer h2 {
      margin: 0 0 1em;
      font-size: 1.4em;
      color: var(--teal);
    }

    form {
      display: grid;
      gap: 0.8em;
    }

    label {
      display: grid;
      gap: 0.3em;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 0.75em;
      border: 1px solid var(--light-teal);
      font: inherit;
    }

    textarea {
      min-height: 8em;
      resize: vertical;
    }

    button {
      width: fit-content;
      padding: 0.8em 1.2em;
      border: 0;
      background: var(--amber);
      color: var(--text);
      font: inherit;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: var(--orange);
    }

    @media (max-width: 38em) {
      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 1em;
      }

      .logo {
        max-width: 70%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <img class="logo" src="CommitToPaper_2026_logo-color.png" alt="CommitToPaper logo">
      <h1 class="header-title">Support in research grant writing</h1>
    </header>

    <main>
      <section class="content">
        <p>CommitToPaper OÜ is an Estonian private limited company that helps researchers prepare grant applications.</p>

        <p>Support is available for grant writing, training, and consulting.</p>
      </section>
    </main>

    <footer>
      <h2>Contact</h2>

      <form action="mailto:committopaper@gmail.com" method="post" enctype="text/plain">
        <label>
          Name
          <input type="text" name="name" required>
        </label>

        <label>
          Email
          <input type="email" name="email" required>
        </label>

        <label>
          Message
          <textarea name="message" required></textarea>
        </label>

        <button type="submit">Send message</button>
      </form>
    </footer>
  </div>
</body>
</html>
